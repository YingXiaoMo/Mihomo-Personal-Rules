# 规则并不是越多越好，在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。

# 仅自用，要用的可以根据自己需求修改一下。






# 锚点部分
# 连通性检查通用锚点
Check: &Check { url: https://www.gstatic.com/generate_204, interval: 180, timeout: 5000, tolerance: 20, lazy: false } 
# DNS锚点
Dns: &Dns [ "tls://223.5.5.5", "tls://223.6.6.6" ]
Dns-Direct: &Dns-Direct [ "https://dns.alidns.com/dns-query", "https://doh.pub/dns-query" ]
Dns-Proxy: &Dns-Proxy [ "https://cloudflare-dns.com/dns-query", "https://dns.google/dns-query" ]



# 机场订阅（所有订阅统一写在同一个 proxy-providers 块中，有多个机场就复制一下，修改"机场订阅"和"Airport1"不要重名即可）
proxy-providers:
  Airport1:
    url: "机场订阅"
    type: http
    interval: 86400
    health-check:
      enable: true
      <<: *Check
    proxy: 直连


# 全局配置
port: 7890                                                         # HTTP(S) 代理端口
socks-port: 7891                                                   # SOCKS5 代理端口 
redir-port: 7892                                                   # 流量转发端口   
mixed-port: 7893                                                   # HTTP(S)&SOCKS5 混合代理端口
tproxy-port: 7894                                                  # DNS监听端口
allow-lan: true                                                    # 允许局域网
bind-address: "*"                                                  # 局域网ip，*表示所有
ipv6: true                                                         # ipv6，false表示关闭
unified-delay: true                                                # 统一延迟
tcp-concurrent: true                                               # tcp并发
log-level: info                                                    # 日志等级
mode: rule                                                         # 运行模式
find-process-mode: 'off'                                           # 进程匹配                #always，总是匹配             strict，自动匹配
# interface-name: en0                         # 绑定网卡
global-client-fingerprint: chrome                                  # 浏览器伪装
keep-alive-idle: 600                                               # 手机省电
keep-alive-interval: 15                                            # 手机省电
disable-keep-alive: false                                          # 关闭手机省电
profile:
  store-selected: true                                             
  store-fake-ip: true                                              # 选择的节点和fake-ip缓存，false表示关闭

# 控制面板
#（所有插件都自带可以在设置里下载，所以不写了 ）

# 嗅探
sniffer:
  enable: true
  force-dns-mapping: true                                          # 对 redir-host 类型识别的流量进行强制嗅探
  parse-pure-ip: true                                              # 对所有未获取到域名的流量进行强制嗅探
  override-destination: true                                       # 是否使用嗅探结果作为实际访问
  sniff: {HTTP: {ports: [80, "8080-8880"], override-destination: true}, TLS: {ports: [443, 8443]}, QUIC: {ports: [443, 8443]}}
  force-domain: ["+.v2ex.com"]
  skip-domain:
    - "dlg.io.mi.com"

# 入站
tun:
  enable: true                                                      # 开启tun
  stack: system                                                     # 三种模式,system（兼容性最好但是udp支持不佳）/gvisor（udp支持好）/mixed（结合前两个的优点）
  dns-hijack: ["any:53", "tcp://any:53"]                            # 劫持53端口
  auto-route: true                                                  # 自动路由
  auto-redirect: true                                               # 自动重定向
  auto-detect-interface: true                                       # 自动接口选择
  endpoint-independent-nat: true                                    # 启用独立于端点的 NAT
  udp-timeout: 300s                                                 # UDP NAT 过期时间，以秒为单位

# DNS模块
dns:
  enable: true                                                      # 开启dns
  listen: "0.0.0.0:1053"                                            # dns端口
  ipv6: true                                                        # ipv6
  respect-rules: true                                               #让连接DNS服务器时能够遵循规则，也就是通过代理节点连接到上面设置的国外DNS，因为直连可能连接不上
  enhanced-mode: fake-ip                                            # 模式选择
  fake-ip-range: "198.18.0.1/16"                                    # fake-ip地址池
  fake-ip-range6: "fd00::/8"
  fake-ip-filter-mode: blacklist                                    # 黑白名单
  fake-ip-filter:
#    - "+.*"
    - geosite:cn
    - rule-set:fakeip过滤 
    - "+.rockstargames.com"
    - "+.services.googleapis.cn"
    - "+.xn--ngstr-lra8j.com"
    - "time.*.com"
    - "+.pool.ntp.org"
    - "+.ntp.tencent.com"
    - "+.ntp1.aliyun.com"
    - "+.ntp.ntsc.ac.cn"
    - "+.cn.ntp.org.cn"

  default-nameserver: *Dns                  #基础DNS服务器，必须先有它才能使用域名类型的DNS配置，因此必须为IP，此处使用阿里云DNS
  direct-nameserver: *Dns-Direct            #规则匹配到直连时使用的DNS，既然是可以直连的，当然要用国内DNS
  proxy-server-nameserver: *Dns-Direct      #解析代理节点时使用的DNS，为了使下面的respect-rules生效必须设置，最好设置为国内DNS，否则在代理的第一步就可能因为连接不上国外DNS而解析不出代理节点的IP，最终倒在起点
  nameserver: *Dns-Proxy                    #在访问的国外网站没有匹配到任何域名规则，最终走了MATCH兜底规则时使用的DNS，为了确保不发生DNS泄漏和DNS污染，必须使用国外DNS
#  nameserver-policy:
#     "geosite:cn":
#        - 223.5.5.5
#     "+.rockstargames.com":
#        - 223.5.5.5             
#    - https://dns.alidns.com/dns-query
#    - https://doh.pub/dns-query
    



# 节点选择锚点
all: &all {  type: select, proxies: [ 新加坡智能, 香港智能, 日本智能, 美国智能, 其他智能, 自建智能, 新加坡手动, 香港手动, 日本手动, 美国手动, 其他手动, 自建手动, 全部手动, 直连 ] } 
Emby: &Emby {  type: select, proxies: [ Emby智能, Emby手动 ] } 
Bybit: &Bybit {  type: select, proxies: [ Bybit服务 ] } 

# 节点筛选锚点
SG: &SG { filter: "(?i)新加坡|坡|狮城|SG|Singapore" } 
HK: &HK { filter: "(?i)港|hk|hongkong|hong kong" } 
US: &US { filter: "(?i)(us|united states|美国|美区)" }
JP: &JP { filter: "(?i)日本|jp|japan" } 
ZJ: &ZJ { filter: "(?i)(自建|workers)(?!.*移动)" } 
E: &E { filter: "(?i)(香港|港|hk|新加坡|sg|坡|狮城|美|us|united states)" }
B: &B { filter: "^((?!US|美国|自建|直连|流量|到期|重置|HK|香港|SG|新加坡|CA|加拿大|FR|法国|UK|英国|KR|朝鲜|CU|古巴|IR|伊朗|UZ|乌兹别克|SU|苏丹|SY|叙利亚|UA|俄罗斯控制乌克兰|Се|塞瓦斯托波尔).)*$" } 
Other: &Other { filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|直连|jp|japan|新|sg|singapore|美|us|unitedstates)).*" } 

# 节点分组锚点
# Select 策略通用模板 (用于手动选择)
Select: &Select { type: select, include-all: true, exclude-type: direct  } 
# Smart 策略通用模板 (用于智能选择)
Smart: &Smart { type: smart, include-all: true, uselightgbm: true, collectdata: true, strategy: sticky-sessions, <<: *Check, exclude-type: direct }  
# Url-Test 策略通用模板 (用于自动选择)
Url-Test: &Url-Test { type: url-test, include-all: true, <<: *Check, exclude-type: direct }
# Fallback 策略通用模板 (用于故障转移)
Fallback: &Fallback { type: fallback, <<: *Check, lazy: false }
# Round-Robin 策略通用模板 (用于轮询负载均衡)
# 轮询会循环使用列表中的节点，适用于需要平均分配负载的场景
RR: &RR { type: load-balance, strategy: round-robin, include-all: true, <<: *Check, exclude-type: direct }
# Load-Balance (散列) 策略通用模板
# 适用于需要保持客户端连接一致性（例如，防止频繁切换 IP 导致登录失效）的场景
CH: &CH { type: load-balance, strategy: consistent-hashing, include-all: true, <<: *Check, exclude-type: direct }

